        { type: 'qa', q: "為什麼衣索比亞的狗長得很像貓？", a: "因為牠們都餓到只剩骨架了。" },
        { type: 'qa', q: "如果一輛載滿黑人的巴士開下懸崖，會發生什麼事？", a: "浪費，因為裡面本來可以塞更多人。" },
        { type: 'qa', q: "為什麼恐怖分子不喜歡喝可樂？", a: "因為一打開就有『啵』的一聲，他們以為要引爆了。" },
        { type: 'qa', q: "為什麼黑人家裡沒有保險箱？", a: "因為有保險箱也沒用，整台都會被隔壁的黑人搬走。" },
        { type: 'qa', q: "為什麼唐氏症的小孩不適合玩剪刀石頭布？", a: "因為他們出什麼看起來都像出拳頭。" }
    ];

    let remainingJokes = [];
    let jokeCount = 0; // 用來計算使用者總共「看了」幾個笑話

    function switchSection(sectionId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
    }

    function goToResponse(choiceText) {
        document.getElementById('user-choice-echo').innerText = `你選擇了："${choiceText}"`;
        switchSection('response-section');
    }

    function startJokes() {
        remainingJokes = [...jokesDatabase];
        jokeCount = 0; 
        updateCounterDisplay();
        switchSection('joke-display-section');
        showNextRandomJoke();
    }

    function updateCounterDisplay() {
        document.getElementById('joke-counter').innerText = `目前已看了：${jokeCount} 個笑話`;
    }

    function showNextRandomJoke() {
        jokeCount++; // 每次顯示新笑話時，計數器就加 1
        updateCounterDisplay();

        if (remainingJokes.length === 0) {
            remainingJokes = [...jokesDatabase];
        }

        const randomIndex = Math.floor(Math.random() * remainingJokes.length);
        const joke = remainingJokes.splice(randomIndex, 1)[0];

        const box = document.getElementById('joke-content-box');
        box.innerHTML = ''; 

        if (joke.type === 'qa') {
            const qEl = document.createElement('div');
            qEl.className = 'joke-q';
            qEl.innerText = joke.q;
            box.appendChild(qEl);

            const ansBtn = document.createElement('button');
            ansBtn.className = 'btn btn-ans';
            ansBtn.innerText = '看答案';
            
            const aEl = document.createElement('div');
            aEl.className = 'joke-a';
            aEl.style.display = 'none';
            aEl.innerText = joke.a;
            
            ansBtn.onclick = function() {
                aEl.style.display = 'block';
                ansBtn.style.display = 'none';
            };

            box.appendChild(ansBtn);
            box.appendChild(aEl);

        } else if (joke.type === 'statement') {
            const textEl = document.createElement('div');
            textEl.className = 'joke-q'; 
            textEl.innerText = joke.text;
            box.appendChild(textEl);

        } else if (joke.type === 'image') {
            const imgEl = document.createElement('img');
            imgEl.className = 'joke-img';
            imgEl.src = joke.url;
            imgEl.alt = "地獄隨機梗圖";
            box.appendChild(imgEl);
        }
    }

    function stopJokes() {
        document.getElementById('joke-summary-count').innerText = `你總共挑戰了 ${jokeCount} 個地獄梗。`;
        
        const evalOutput = document.getElementById('evaluation-output');
        let evaluationText = "";

        // 依據使用者看的笑話數量判定等級
        if (jokeCount >= 0 && jokeCount <= 10) {
            evaluationText = "業障算淺，過可功抵";
        } else if (jokeCount >= 11 && jokeCount <= 20) {
            evaluationText = "你一隻腳踏進了地獄";
        } else if (jokeCount >= 21 && jokeCount <= 30) {
            evaluationText = "半截身體感受火熱";
        } else if (jokeCount >= 31 && jokeCount <= 40) {
            evaluationText = "你已沐浴在岩漿中";
        } else if (jokeCount >= 41 && jokeCount <= 50) {
            evaluationText = "可以成為地獄官吏了";
        } else if (jokeCount >= 51 && jokeCount <= 63) {
            evaluationText = "你已踏入深淵萬劫不復，恭喜獲得和溫寀慈一樣等級的殊榮";
        } else {
            // 超過 63 的防呆機制
            evaluationText = "你已踏入深淵萬劫不復，恭喜獲得和溫寀慈一樣等級的殊榮";
        }

        evalOutput.innerText = evaluationText;
        switchSection('end-section');
    }
</script>
